<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Bonus Code</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 2px solid #55ff55; box-shadow: 0 0 20px rgba(85, 255, 85, 0.2); text-align: center; max-width: 400px; }
        h1 { color: #55ff55; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #aaaaaa; margin-bottom: 30px; }
        .code-box { background: #2d2d2d; padding: 20px; border-radius: 8px; border: 1px dashed #55ff55; font-size: 32px; font-weight: bold; color: #ffff55; letter-spacing: 4px; cursor: pointer; transition: transform 0.2s; }
        .code-box:hover { transform: scale(1.05); }
        .footer { margin-top: 25px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bonus Aktiv!</h1>
        <p>Danke fürs Werbeschauen. Hier ist dein Code für Minecraft:</p>
        <div class="code-box" onclick="navigator.clipboard.writeText('GOLD26')">GOLD26</div>
        <div class="footer">Klicke auf den Code zum Kopieren.<br>Gib ihn im Spiel mit /trigger bonus_code set 26 ein!</div>
    </div>
</body>
</html>
